name: Build TeleBlast
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4 # Perbarui dari v3 ke v4

      - name: Install Node.js
        uses: actions/setup-node@v4 # Perbarui dari v3 ke v4
        with:
          node-version: 22 # Tetap gunakan Node 22 untuk Electron kamu

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true